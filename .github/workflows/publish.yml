name: publish
on:
  push:
    branches: [main]
jobs:
  wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
